<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
  <th:block th:fragment="home_counter">
    <section
      class="relative z-10 mx-auto mt-6 flex max-w-4xl flex-col items-center gap-4 px-4 text-center"
      x-data="counter()"
      th:attr="data-rel-date=${theme.config.home.relationship_start.date}, data-rel-hour=${theme.config.home.relationship_start.hour}, data-rel-minute=${theme.config.home.relationship_start.minute}, data-rel-second=${theme.config.home.relationship_start.second}"
    >
      <div class="text-xl font-semibold text-white drop-shadow">这是我们走过的</div>
      <div class="grid grid-cols-4 gap-2">
        <div class="rounded-lg bg-white/80 px-4 py-3 shadow backdrop-blur">
          <div class="text-3xl font-bold" x-text="time.days">0</div>
          <div class="text-xs text-gray-600">天</div>
        </div>
        <div class="rounded-lg bg-white/80 px-4 py-3 shadow backdrop-blur">
          <div class="text-3xl font-bold" x-text="time.hours">0</div>
          <div class="text-xs text-gray-600">时</div>
        </div>
        <div class="rounded-lg bg-white/80 px-4 py-3 shadow backdrop-blur">
          <div class="text-3xl font-bold" x-text="time.minutes">0</div>
          <div class="text-xs text-gray-600">分</div>
        </div>
        <div class="rounded-lg bg-white/80 px-4 py-3 shadow backdrop-blur">
          <div class="text-3xl font-bold" x-text="time.seconds">0</div>
          <div class="text-xs text-gray-600">秒</div>
        </div>
      </div>
    </section>
  </th:block>
</html>
